services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openreview
      POSTGRES_PASSWORD: openreview
      POSTGRES_DB: openreview
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openreview"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: openreview
      MINIO_ROOT_PASSWORD: openreview-secret
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 openreview openreview-secret; do sleep 1; done;
      mc mb -p local/originals;
      mc mb -p local/proxies;
      exit 0;
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
