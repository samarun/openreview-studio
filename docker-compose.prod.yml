services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openreview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openreview}
      POSTGRES_DB: ${POSTGRES_DB:-openreview}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openreview}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-openreview}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-openreview-secret}
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-openreview} ${S3_SECRET_ACCESS_KEY:-openreview-secret}; do sleep 1; done;
      mc mb -p local/${S3_BUCKET_ORIGINALS:-originals};
      mc mb -p local/${S3_BUCKET_PROXIES:-proxies};
      exit 0;
      "

  api:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    command: pnpm --filter @openreview/api start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-openreview}:${POSTGRES_PASSWORD:-openreview}@postgres:5432/${POSTGRES_DB:-openreview}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-openreview}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-openreview-secret}
      S3_BUCKET_ORIGINALS: ${S3_BUCKET_ORIGINALS:-originals}
      S3_BUCKET_PROXIES: ${S3_BUCKET_PROXIES:-proxies}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      TRANSCODE_JOB_ATTEMPTS: ${TRANSCODE_JOB_ATTEMPTS:-3}
      TRANSCODE_JOB_BACKOFF_MS: ${TRANSCODE_JOB_BACKOFF_MS:-30000}
      TRANSCODE_JOB_COMPLETE_RETENTION_SECONDS: ${TRANSCODE_JOB_COMPLETE_RETENTION_SECONDS:-86400}
      TRANSCODE_JOB_FAILED_RETENTION_SECONDS: ${TRANSCODE_JOB_FAILED_RETENTION_SECONDS:-604800}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    command: pnpm --filter @openreview/worker start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-openreview}:${POSTGRES_PASSWORD:-openreview}@postgres:5432/${POSTGRES_DB:-openreview}?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-openreview}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-openreview-secret}
      S3_BUCKET_ORIGINALS: ${S3_BUCKET_ORIGINALS:-originals}
      S3_BUCKET_PROXIES: ${S3_BUCKET_PROXIES:-proxies}
      S3_FORCE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    command: pnpm --filter @openreview/web start
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  minio-data:
